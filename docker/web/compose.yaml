# docker/web/compose.yaml — run the browser-frontend Clodex image as a service.
#
#   docker compose -f docker/web/compose.yaml up --build
#   # then open http://localhost:7810
#
# See README.md for the auth stance, the volume map, and the macOS OAuth gotcha.

services:
  clodex:
    # A stable hostname, because it is the engine's SELF_LABEL on the peer wire:
    # the peer's display label on your desktop AND the origin suffix agent DMs
    # carry (agent@host). Without it Docker assigns the random container id,
    # which changes on every recreate — breaking DM reply routing, not just
    # cosmetics. Rename to taste; keep it stable once peers know it.
    hostname: sandbox
    build:
      context: ../..                     # the repo root
      dockerfile: docker/web/Dockerfile
    # The localhost publish IS auth v1's boundary (same trust stance as remote.js
    # v1): only this machine can reach the port. Widening it — e.g.
    # "0.0.0.0:7810:8080" to expose on the LAN — means setting CLODEX_WEB_TOKEN
    # (below) to a strong secret first. Do not widen without it.
    # Host side is 7810 (Clodex's service neighborhood — wirescope sits on 7800,
    # peering on 7900); the container side stays 8080 (CLODEX_WEB_PORT).
    ports:
      - "127.0.0.1:7810:8080"
      # Two neighbor publishes, loopback-only (SAME trust stance as 7810 — only
      # this machine reaches them). The web TOKEN does NOT gate these: they are
      # separate services (wirescope's own HTTP, the peer wire's own HTTP), not
      # routed through web-host. Their boundary is the loopback publish alone.
      #   7811 → wirescope's full-dashboard HTTP (the "Open full dashboard" jump-outs)
      - "127.0.0.1:7811:7800"
      #   7820 → the peer wire (RemoteServer) so a desktop Clodex can peer THIS
      #          container as a direct-URL peer (http://127.0.0.1:7820) — see README.
      - "127.0.0.1:7820:7900"
    environment:
      # Empty = localhost trust. Set a strong secret before widening the publish;
      # the browser then needs ?token=<secret> on the page URL.
      CLODEX_WEB_TOKEN: "${CLODEX_WEB_TOKEN:-}"
      # Comma-separated workspace ids to restore (single-workspace by convention).
      # NOTE: browser-created workspaces are NOT auto-added here, so they don't
      # survive a container relaunch unless you extend this list (see README).
      CLODEX_WORKSPACES: "${CLODEX_WORKSPACES:-default}"
      # The browser-reachable address of the wirescope dashboard (the 7811 publish
      # above). The web client rewrites the engine's loopback dashboard links to
      # this so "Open full dashboard" resolves. Change it if you remap 7811.
      CLODEX_WIRESCOPE_PUBLIC_URL: "${CLODEX_WIRESCOPE_PUBLIC_URL:-http://localhost:7811}"
    volumes:
      - clodex-data:/data                     # sessions.json + stores + exports
      - clodex-dot:/home/clodex/.clodex       # agent registry / messages / log
      - claude-auth:/home/clodex/.claude      # Claude OAuth — persists the login
      # The agents' workspace. A named volume by default so work created inside
      # the container SURVIVES `down` — but the recommended setup is a bind
      # mount of a real host folder (work lands on your disk, editable and
      # backed up like any other project). Swap the line to e.g.:
      #   - ~/clodex-work:/home/clodex/work
      - clodex-work:/home/clodex/work
    init: true                            # PID-1 reaper for PTY process trees
    # The supervisor half of the exit-64 restart contract: relaunch on a
    # restart-request (exit 64) and on a clean exit-0, as a service should.
    restart: always
    healthcheck:
      # No curl/wget in the slim image — probe /healthz with the bundled node.
      # /healthz is unauthenticated, so this works with or without a token.
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:8080/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  clodex-data:
  clodex-dot:
  claude-auth:
  clodex-work:
