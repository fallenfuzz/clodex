  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

d: transparent; }\n  }\n  .session-item.mention-pulse {\n    animation: mentionPulse 1.6s ease-out;\n  }\n\n  /* New-session appearance animation */\n  @keyframes sessionAppear {\n    from { opacity: 0; transform: translateX(-8px); }\n    to   { opacity: 1; transform: translateX(0); }\n  }\n  .session-item.appearing { animation: sessionAppear 0.25s ease-out; }\n\n  /* --- Main area --- */\n  .main {\n    background: var(--bg);\n    display: flex; flex-direction: column;\n    min-height: 0; position: relative;\n  }\n\n  .terminal {\n    flex: 1;\n    padding: 10px 14px;\n    font-family: 'SF Mono', Menlo, Consolas, monospace;\n    font-size: 12px;\n    line-height: 1.55;\n    overflow: hidden;\n    color: #d5d9e4;\n    position: relative;\n    min-height: 0;\n  }\n  .terminal-inner {\n    position: absolute; inset: 10px 14px;\n    overflow: hidden;\n    display: flex; flex-direction: column;\n    justify-content: flex-end;\n  }\n  .term-line { white-space: pre-wrap; word-break: break-word; }\n  .term-empty {\n    position: absolute; inset: 0;\n    display: flex; align-items: center; justify-content: center;\n    flex-direction: column; color: var(--text-dim); gap: 6px;\n  }\n  .term-empty .hint { font-size: 12px; }\n\n  /* Claude-style prompt styling */\n  .t-dim { color: var(--text-dim); }\n  .t-user { color: #c9d1ff; }\n  .t-ast  { color: #e8e8ea; }\n  .t-dot-claude { color: #d97757; }   /* Claude orange */\n  .t-dot-codex  { color: #58a6ff; }   /* Codex blue */\n  .t-ok { color: #4ade80; }\n  .t-warn { color: #fbbf24; }\n  .t-err { color: #e94560; }\n  .t-intent { color: #c084fc; }       /* [cli:*] purple */\n  .t-from { color: #fbbf24; }         /* incoming [from *] amber */\n  .t-peers { color: #60a5fa; }\n  .t-cmd  { color: #8ec7ff; }\n  .t-box  { color: #52617c; }\n\n  /* blinking cursor for the active terminal's last line */\n  .cursor::after {\n    content: '▍';\n    color: #c9d1ff;\n    animation: blink 1s steps(1) infinite;\n    margin-left: 1px;\n  }\n  @keyframes blink {\n    50% { opacity: 0; }\n  }\n\n  /* --- IPC log panel --- */\n  .ipc-log {\n    background: var(--sidebar-bg);\n    border-top: 1px solid var(--border);\n    display: flex; flex-direction: column;\n    height: 180px;\n    flex-shrink: 0;\n  }\n  .ipc-header {\n    display: flex; align-items: center; gap: 10px;\n    padding: 6px 12px;\n    border-bottom: 1px solid var(--border);\n    height: 32px; flex-shrink: 0;\n  }\n  .ipc-title { font-weight: 600; font-size: 12px; }\n  .ipc-count {\n    font-size: 10px; background: var(--accent); color: #fff;\n    border-radius: 10px; padding: 1px 7px; min-width: 18px;\n    text-align: center;\n  }\n  .ipc-count.zero { background: var(--border); color: var(--text-dim); }\n  .ipc-spacer { flex: 1; }\n  .ipc-btn {\n    background: transparent; border: none; color: var(--text-dim);\n    font-size: 11px; cursor: pointer; padding: 3px 8px; border-radius: 4px;\n  }\n  .ipc-broadcast {\n    display: flex; gap: 6px; padding: 8px 12px;\n    border-bottom: 1px solid var(--border); flex-shrink: 0;\n  }\n  .ipc-broadcast input {\n    flex: 1; padding: 6px 10px;\n    background: var(--bg); border: 1px solid var(--border);\n    border-radius: 6px; color: var(--text); font-size: 12px;\n    outline: none; font-family: inherit;\n  }\n  .ipc-broadcast input:focus { border-color: var(--accent); }\n  .ipc-send {\n    padding: 6px 14px; background: var(--accent); color: #fff;\n    border: none; border-radius: 6px; font-size: 12px;\n    font-weight: 500; cursor: pointer;\n  }\n  .ipc-body {\n    flex: 1; overflow-y: auto;\n    padding: 8px 12px;\n    font-family: 'SF Mono', Menlo, monospace;\n    font-size: 12px;\n  }\n  .ipc-empty {\n    color: var(--text-dim); font-style: italic;\n    font-size: 11px; font-family: -apple-system, sans-serif;\n    text-align: center; padding: 30px 0;\n  }\n  .ipc-entry {\n    display: flex; gap: 8px; padding: 4px 0;\n    border-bottom: 1px solid rgba(255,255,255,0.03);\n    align-items: flex-start;\n    animation: entryIn 0.3s ease-out;\n  }\n  @keyframes entryIn {\n    from { opacity: 0; transform: translateY(-4px); }\n    to { opacity: 1; transform: translateY(0); }\n  }\n  .ipc-time { color: var(--text-dim); font-size: 10px; padding-top: 2px; flex-shrink: 0; }\n  .ipc-who { font-weight: 600; color: #60a5fa; flex-shrink: 0; }\n  .ipc-arrow { color: var(--accent); flex-shrink: 0; }\n  .ipc-to { font-weight: 600; color: #c084fc; flex-shrink: 0; }\n  .ipc-body-text { color: var(--text); word-break: break-word; }\n  .ipc-kind {\n    font-size: 9px; text-transform: uppercase; letter-spacing: 0.6px;\n    padding: 1px 5px; border-radius: 3px; margin-right: 4px;\n    background: rgba(255,255,255,0.06); color: var(--text-dim);\n    flex-shrink: 0;\n  }\n  .ipc-kind.dm { background: rgba(96, 165, 250, 0.2); color: #60a5fa; }\n  .ipc-kind.br { background: rgba(233, 69, 96, 0.2); color: var(--accent); }\n  .ipc-kind.who { background: rgba(192, 132, 252, 0.2); color: #c084fc; }\n\n  /* ===== New-session dialog (appears over the app) ===== */\n  .dialog-overlay {\n    position: absolute; inset: 0;\n    background: rgba(0,0,0,0.5);\n    display: flex; align-items: center; justify-content: center;\n    z-index: 30;\n    opacity: 0; pointer-events: none;\n    transition: opacity 0.18s ease;\n  }\n  .dialog-overlay.open { opacity: 1; pointer-events: auto; }\n  .dialog {\n    background: var(--sidebar-bg);\n    border: 1px solid var(--border);\n    border-radius: 12px;\n    padding: 22px;\n    width: 340px;\n    transform: translateY(8px) scale(0.98);\n    transition: transform 0.18s ease;\n    box-shadow: 0 20px 50px -10px rgba(0,0,0,0.6);\n  }\n  .dialog-overlay.open .dialog { transform: translateY(0) scale(1); }\n  .dialog h3 { font-size: 15px; margin-bottom: 14px; }\n  .dialog label { display: block; margin-bottom: 10px; font-size: 11px; color: var(--text-dim); }\n  .dialog input, .dialog select {\n    display: block; width: 100%; margin-top: 4px;\n    padding: 7px 9px; background: var(--bg); border: 1px solid var(--border);\n    border-radius: 6px; color: var(--text); font-size: 12px; outline: none;\n    font-family: inherit;\n  }\n  .dialog input:focus, .dialog select:focus { border-color: var(--accent); }\n  .dialog-actions {\n    display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px;\n  }\n  .dialog-actions button {\n    padding: 6px 14px; border: none; border-radius: 6px;\n    font-size: 12px; cursor: pointer; font-weight: 500;\n  }\n  .btn-primary { background: var(--accent); color: #fff; }\n  .btn-secondary { background: var(--border); color: var(--text); }\n\n  /* Simulated cursor (mouse pointer) that moves over the UI */\n  .fake-cursor {\n    position: absolute;\n    width: 18px; height: 18px;\n    pointer-events: none;\n    z-index: 100;\n    transition: left 0.6s cubic-bezier(.22,.8,.36,1), top 0.6s cubic-bezier(.22,.8,.36,1);\n    opacity: 0;\n  }\n  .fake-cursor.visible { opacity: 1; }\n  .fake-cursor svg { width: 100%; height: 100%; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.6)); }\n  .fake-cursor.clicking::after {\n    content: '';\n    position: absolute;\n    left: 50%; top: 50%;\n    width: 30px; height: 30px;\n    border-radius: 50%;\n    border: 2px solid rgba(233, 69, 96, 0.8);\n    transform: translate(-50%, -50%) scale(0);\n    animation: clickPing 0.5s ease-out;\n  }\n  @keyframes clickPing {\n    0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }\n    100% { transform: translate(-50%, -50%) scale(1.6); opacity: 0; }\n  }\n\n  /* Spotlight ring — draws attention to a UI element */\n  .spotlight {\n    position: absolute;\n    border: 2px solid var(--accent);\n    border-radius: 8px;\n    box-shadow: 0 0 0 4px rgba(233, 69, 96, 0.15);\n    pointer-events: none;\n    z-index: 50;\n    opacity: 0;\n    transition: opacity 0.25s ease, left 0.3s, top 0.3s, width 0.3s, height 0.3s;\n  }\n  .spotlight.visible { opacity: 1; }\n\n  /* ===== Right column: narrator + step list ===== */\n  .narrator {\n    background: var(--caption-bg);\n    border: 1px solid var(--caption-border);\n    border-radius: 10px;\n    padding: 18px 20px;\n    display: flex;\n    flex-direction: column;\n    min-height: 0;\n    overflow: hidden;\n  }\n  .narrator-header {\n    display: flex; align-items: center; gap: 10px;\n    margin-bottom: 14px;\n  }\n  .narrator-badge {\n    width: 32px; height: 32px;\n    background: var(--accent);\n    border-radius: 8px;\n    display: flex; align-items: center; justify-content: center;\n    font-weight: 800; color: #fff; font-size: 14px;\n    letter-spacing: -0.5px;\n  }\n  .narrator-brand {\n    font-size: 10px; text-transform: uppercase;\n    letter-spacing: 1.2px; color: var(--text-dim); font-weight: 600;\n  }\n  .narrator-title { font-size: 15px; font-weight: 700; color: var(--text); }\n\n  .step-progress {\n    display: flex; gap: 4px; margin-bottom: 16px;\n  }\n  .step-dot {\n    flex: 1; height: 3px; border-radius: 2px;\n    background: var(--border);\n    transition: background 0.3s;\n  }\n  .step-dot.done { background: var(--accent); }\n  .step-dot.active { background: var(--text); }\n\n  .step-title {\n    font-size: 13px; font-weight: 700; color: var(--text);\n    margin-bottom: 6px;\n    text-transform: uppercase; letter-spacing: 0.8px;\n  }\n  .step-index {\n    font-size: 11px; color: var(--text-dim); font-weight: 600;\n    margin-bottom: 4px;\n  }\n  .step-headline {\n    font-size: 18px; font-weight: 700;\n    line-height: 1.25; margin-bottom: 10px;\n    text-wrap: pretty;\n  }\n  .step-body {\n    font-size: 13px; line-height: 1.55; color: #b8c0d2;\n    margin-bottom: 14px;\n    text-wrap: pretty;\n  }\n  .step-body code {\n    font-family: 'SF Mono', Menlo, monospace;\n    font-size: 11.5px;\n    background: rgba(255,255,255,0.06);\n    padding: 1.5px 5px;\n    border-radius: 4px;\n    color: #e2e8f0;\n  }\n  .step-body .pill {\n    display: inline-block;\n    padding: 1.5px 7px;\n    font-size: 10.5px;\n    font-weight: 600;\n    border-radius: 10px;\n    margin-right: 4px;\n    letter-spacing: 0.3px;\n  }\n  .pill.dm { background: rgba(96, 165, 250, 0.18); color: #7fb6ff; }\n  .pill.br { background: rgba(233, 69, 96, 0.18); color: #ff7a92; }\n  .pill.who { background: rgba(192, 132, 252, 0.18); color: #d7b4fe; }\n\n  .narrator-footer {\n    margin-top: auto; padding-top: 14px;\n    border-top: 1px solid var(--caption-border);\n    display: flex; align-items: center; gap: 10px;\n  }\n\n  /* ===== Playback bar ===== */\n  .playbar {\n    display: flex;\n    align-items: center;\n    gap: 10px;\n    background: var(--caption-bg);\n    border: 1px solid var(--caption-border);\n    border-radius: 10px;\n    padding: 10px 14px;\n    font-size: 12px;\n  }\n  .playbar button {\n    background: var(--border); color: var(--text);\n    border: none; border-radius: 6px;\n    padding: 6px 12px; font-size: 12px; font-weight: 500;\n    cursor: pointer; display: inline-flex; align-items: center; gap: 6px;\n    transition: background 0.12s;\n  }\n  .playbar button:hover { background: #2e4068; }\n  .playbar button.primary { background: var(--accent); color: #fff; }\n  .playbar button.primary:hover { background: #ff5d7a; }\n  .playbar .playhead {\n    flex: 1; display: flex; gap: 4px;\n    margin: 0 8px;\n  }\n  .chapter-btn {\n    padding: 6px 10px !important;\n    font-size: 11px !important;\n    background: transparent !important;\n    color: var(--text-dim) !important;\n    border: 1px solid transparent !important;\n    border-radius: 6px;\n    white-space: nowrap;\n  }\n  .chapter-btn:hover { color: var(--text) !important; background: var(--sidebar-hover) !important; }\n  .chapter-btn.active {\n    color: var(--text) !important;\n    background: var(--active-bg) !important;\n    border-color: var(--border) !important;\n  }\n  .playbar .label {\n    color: var(--text-dim);\n    font-size: 11px;\n    text-transform: uppercase;\n    letter-spacing: 0.6px;\n    font-weight: 600;\n  }\n\n  /* Toast          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Prompts drawer (overlay) -->\n        <div class=\"prompts-drawer\" id=\"promptsDrawer\">\n          <div class=\"ph\">\n            <span class=\"ph-title\">Prompts Library<\u002Fspan>\n            <button class=\"btn-ico\" style=\"width:24px;height:24px;font-size:11px;\">+ New<\u002Fbutton>\n            <button class=\"btn-ico\" style=\"width:24px;height:24px;background:transparent;\">×<\u002Fbutton>\n          <\u002Fdiv>\n          <div class=\"prompts-list\">\n            <div class=\"prompt-item\">\n              <div class=\"prompt-item-title\">Run the failing tests<\u002Fdiv>\n              <div class=\"prompt-item-preview\">cd tests &amp;&amp; npm test -- --watch. report failures by file…<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"prompt-item\">\n              <div class=\"prompt-item-title\">Review PR for correctness<\u002Fdiv>\n              <div class=\"prompt-item-preview\">Look for edge cases, off-by-one errors, error handling…<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"prompt-item\">\n              <div class=\"prompt-item-title\">Summarize this file<\u002Fdiv>\n              <div class=\"prompt-item-preview\">Give a 3-bullet overview of the file's purpose and…<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- New session dialog (overlay) -->\n        <div class=\"dialog-overlay\" id=\"dlgOverlay\">\n          <div class=\"dialog\">\n            <h3>New Session<\u002Fh3>\n            <label>Name\n              <input type=\"text\" id=\"dlgName\" value=\"\">\n            <\u002Flabel>\n            <label>Type\n              <select id=\"dlgType\">\n                <option value=\"claude\">claude<\u002Foption>\n                <option value=\"codex\">codex<\u002Foption>\n                <option value=\"bash\">bash<\u002Foption>\n              <\u002Fselect>\n            <\u002Flabel>\n            <label>Working Directory\n              <input type=\"text\" id=\"dlgCwd\" value=\"~/projects/clodex\" readonly=\"\">\n            <\u002Flabel>\n            <label>System Prompt\n              <select><option>(none)<\u002Foption><\u002Fselect>\n            <\u002Flabel>\n            <label>Extra CLI args\n              <input type=\"text\" placeholder=\"(none)\">\n            <\u002Flabel>\n            <div class=\"dialog-actions\">\n              <button class=\"btn-secondary\" id=\"dlgCancel\">Cancel<\u002Fbutton>\n              <button class=\"btn-primary\" id=\"dlgCreate\">Create<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Spotlight + cursor + toast layer -->\n        <div class=\"spotlight\" id=\"spotlight\"><\u002Fdiv>\n        <div class=\"fake-cursor\" id=\"cursor\">\n          <svg viewBox=\"0 0 24 24\">\n            <path d=\"M3 2l6 17 2.5-6.5L18 10z\" fill=\"#ffffff\" stroke=\"#0a0d17\" stroke-width=\"1.2\" stroke-linejoin=\"round\"><\u002Fpath>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <div class=\"toast\" id=\"toast\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Narrator panel -->\n    <div class=\"narrator\">\n      <div class=\"narrator-header\">\n        <div class=\"narrator-badge\">Cx<\u002Fdiv>\n        <div>\n          <div class=\"narrator-brand\">Clodex<\u002Fdiv>\n          <div class=\"narrator-title\">How it works<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"step-progress\" id=\"stepProgress\"><\u002Fdiv>\n\n      <div class=\"step-index\" id=\"stepIndex\">Step 1 of 7<\u002Fdiv>\n      <div class=\"step-headline\" id=\"stepHeadline\">…<\u002Fdiv>\n      <div class=\"step-body\" id=\"stepBody\">…<\u002Fdiv>\n\n      <div class=\"narrator-footer\">\n        <span class=\"label\" id=\"autoplayLabel\">● Auto<\u002Fspan>\n        <span class=\"ipc-spacer\"><\u002Fspan>\n        <button class=\"ipc-btn\" id=\"btnTweaks\" style=\"padding:5px 10px; border:1px solid var(--border); border-radius:6px;\">Tweaks<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Playback bar -->\n  <div class=\"playbar\">\n    <button class=\"primary\" id=\"btnPlay\">▶ Play<\u002Fbutton>\n    <button id=\"btnRestart\">⟲ Restart<\u002Fbutton>\n    <div class=\"playhead\" id=\"chapterList\"><\u002Fdiv>\n    <span class=\"label\">Speed<\u002Fspan>\n    <select id=\"speedSelect\" style=\"background:var(--border); color:var(--text); border:none; padding:6px 10px; border-radius:6px; font-size:12px;\">\n      <option value=\"2\">0.5×<\u002Foption>\n      <option value=\"1\" selected=\"\">1×<\u002Foption>\n      <option value=\"0.5\">2×<\u002Foption>\n      <option value=\"0.25\">4×<\u002Foption>\n    <\u002Fselect>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fdiv>\n\n<!-- Tweaks -->\n<div class=\"tweaks\" id=\"tweaksPanel\">\n  <h4>Tweaks<\u002Fh4>\n  <label class=\"row\">Auto-advance <input type=\"checkbox\" id=\"tw-auto\" checked=\"\"><\u002Flabel>\n  <label>Accent color\n    <input type=\"color\" id=\"tw-accent\" value=\"#e94560\" style=\"width:100%; height:28px; border:1px solid var(--border); border-radius:6px; background:var(--bg);\">\n  <\u002Flabel>\n  <label class=\"row\">Show cursor <input type=\"checkbox\" id=\"tw-cursor\" checked=\"\"><\u002Flabel>\n  <label class=\"row\">Show spotlight <input type=\"checkbox\" id=\"tw-spot\" checked=\"\"><\u002Flabel>\n<\u002Fdiv>\n\n<script>\n/* =========================================================\n   Clodex demo — scripted walkthrough of the app's core flows\n   ========================================================= */\n\nconst TWEAKS = /*EDITMODE-BEGIN*/{\n  \"accent\": \"#e94560\",\n  \"autoplay\": true,\n  \"showCursor\": true,\n  \"showSpotlight\": true\n}/*EDITMODE-END*/;\n\n// -------- Element refs --------\nconst $ = id => document.getElementById(id);\nconst app = $('app');\nconst sessionList = $('sessionList');\nconst terminal = $('terminal');\nconst termInner = $('termInner');\nconst termEmpty = $('termEmpty');\nconst ipcBody = $('ipcBody');\nconst ipcEmpty = $('ipcEmpty');\nconst ipcCount = $('ipcCount');\nconst cursorEl = $('cursor');\nconst spotlightEl = $('spotlight');\nconst toastEl = $('toast');\nconst dlgOverlay = $('dlgOverlay');\nconst dlgName = $('dlgName');\nconst dlgType = $('dlgType');\nconst promptsDrawer = $('promptsDrawer');\n\nconst stepIndex = $('stepIndex');\nconst stepHeadline = $('stepHeadline');\nconst stepBody = $('stepBody');\nconst stepProgress = $('stepProgress');\n\n// -------- State --------\nconst sessions = new Map(); // name -> {type, cwd, lines, el, ctx}\nlet speed = 1;\nlet playing = false;\nlet cancelled = false;\nlet currentChapter = 0;\nlet stepCursor = 0;\n\n// -------- Utilities --------\nconst sleep = ms => new Promise(r => setTimeout(r, ms * speed));\nconst randJit = (n=80) => Math.random() * n;\n\nfunction setAccent(hex) {\n  document.documentElement.style.setProperty('--accent', hex);\n}\n\nfunction showCursor(show) { cursorEl.classList.toggle('visible', !!show && TWEAKS.showCursor); }\nfunction showSpotlight(show) { spotlightEl.classList.toggle('visible', !!show && TWEAKS.showSpotlight); }\n\nasync function moveCursorTo(targetEl, opts = {}) {\n  if (!TWEAKS.showCursor || !targetEl) return;\n  showCursor(true);\n  const rect = targetEl.getBoundingClientRect();\n  const appRect = app.getBoundingClientRect();\n  const x = rect.left - appRect.left + rect.width * (opts.xRatio ?? 0.5);\n  const y = rect.top - appRect.top + rect.height * (opts.yRatio ?? 0.5);\n  cursorEl.style.left = (x - 2) + 'px';\n  cursorEl.style.top = (y - 2) + 'px';\n  await sleep(opts.delay ?? 600);\n}\n\nasync function clickCursor() {\n  cursorEl.classList.add('clicking');\n  await sleep(180);\n  cursorEl.classList.remove('clicking');\n  await sleep(140);\n}\n\nasync function spotlightOn(targetEl, opts = {}) {\n  if (!TWEAKS.showSpotlight || !targetEl) return;\n  const rect = targetEl.getBoundingClientRect();\n  const appRect = app.getBoundingClientRect();\n  const pad = opts.pad ?? 4;\n  spotlightEl.style.left = (rect.left - appRect.left - pad) + 'px';\n  spotlightEl.style.top = (rect.top - appRect.top - pad) + 'px';\n  spotlightEl.style.width = (rect.width + pad*2) + 'px';\n  spotlightEl.style.height = (rect.height + pad*2) + 'px';\n  showSpotlight(true);\n}\nfunction spotlightOff() { showSpotlight(false); }\n\nasync function showToast(title, body, anchorEl, opts = {}) {\n  const rect = anchorEl.getBoundingClientRect();\n  const appRect = app.getBoundingClientRect();\n  toastEl.innerHTML = `<div class=\"toast-title\">${title}<\u002Fdiv><div>${body}<\u002Fdiv>`;\n  // Position to the right of anchor by default\n  const pos = opts.pos ?? 'right';\n  let left, top;\n  if (pos === 'right') {\n    left = rect.right - appRect.left + 10;\n    top = rect.top - appRect.top + rect.height/2 - 20;\n  } else if (pos === 'below') {\n    left = rect.left - appRect.left;\n    top = rect.bottom - appRect.top + 10;\n  } else if (pos === 'above') {\n    left = rect.left - appRect.left;\n    top = rect.top - appRect.top - 60;\n  }\n  toastEl.style.left = left + 'px';\n  toastEl.style.top = top + 'px';\n  toastEl.classList.add('visible');\n}\nfunction hideToast() { toastEl.classList.remove('visible'); }\n\n// -------- Session UI --------\nfunction addSession({ name, type, cwd, ctx = null }) {\n  termEmpty.style.display = 'none';\n  const el = document.createElement('div');\n  el.className = 'session-item appearing';\n  el.dataset.name = name;\n  el.innerHTML = `\n    <div class=\"session-dot\"><\u002Fdiv>\n    <div class=\"session-info\">\n      <div class=\"session-name\">${name}<\u002Fdiv>\n      <div class=\"session-meta\">\n        <span class=\"session-type\">${type}<\u002Fspan>\n        <span class=\"session-cwd\">${cwd}<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    ${ctx != null ? `<span class=\"session-ctx\" data-level=\"${ctxLevel(ctx)}\">${ctx}%<\u002Fspan>` : ''}\n  `;\n  sessionList.appendChild(el);\n  sessions.set(name, { type, cwd, lines: [], el, ctx });\n  return el;\n}\n\nfunction ctxLevel(pct) {\n  if (pct >= 80) return 'high';\n  if (pct >= 60) return 'mid';\n  return 'low';\n}\n\nfunction activateSession(name) {\n  for (const [n, s] of sessions) {\n    s.el.classList.toggle('active', n === name);\n  }\n  renderTerminal(name);\n}\n\nfunction setActivity(name, state) {\n  const s = sessions.get(name);\n  if (!s) return;\n  if (state === 'thinking') s.el.dataset.activity = 'thinking';\n  else delete s.el.dataset.activity;\n}\n\nfunction mentionPulse(name) {\n  const s = sessions.get(name);\n  if (!s) return;\n  s.el.classList.remove('mention-pulse');\n  // re-trigger animation\n  void s.el.offsetWidth;\n  s.el.classList.add('mention-pulse');\n}\n\nfunction setCtx(name, pct) {\n  const s = sessions.get(name); if (!s) return;\n  s.ctx = pct;\n  let badge = s.el.querySelector('.session-ctx');\n  if (!badge) {\n    badge = document.createElement('span');\n    badge.className = 'session-ctx';\n    s.el.appendChild(badge);\n  }\n  badge.dataset.level = ctxLevel(pct);\n  badge.textContent = pct + '%';\n}\n\n// -------- Terminal rendering --------\nlet activeTerminal = null;\nfunction renderTerminal(name) {\n  activeTerminal = name;\n  termInner.innerHTML = '';\n  if (!name) return;\n  const s = sessions.get(name);\n  if (!s) return;\n  for (const line of s.lines) {\n    const d = document.createElement('div');\n    d.className = 'term-line';\n    d.innerHTML = line;\n    termInner.appendChild(d);\n  }\n  // cursor blink on last line\n  const last = termInner.lastElementChild;\n  if (last) last.classList.add('cursor');\n  termInner.scrollTop = termInner.scrollHeight;\n}\n\nasync function termWrite(name, html, { pause = 180 } = {}) {\n  const s = sessions.get(name); if (!s) return;\n  s.lines.push(html);\n  if (s.lines.length > 80) s.lines.shift();\n  if (activeTerminal === name) renderTerminal(name);\n  await sleep(pause);\n}\n\nasync function termWriteMany(name, lines, { pause = 160 } = {}) {\n  for (const ln of lines) { await termWrite(name, ln, { pause }); }\n}\n\n// -------- IPC log --------\nlet ipcN = 0;\nfunction addIpc({ kind, from, to, body }) {\n  if (ipcEmpty) ipcEmpty.style.display = 'none';\n  const row = document.createElement('div');\n  row.className = 'ipc-entry';\n  const time = new Date().toTimeString().slice(0,8);\n  let toHtml = '';\n  if (kind === 'dm') toHtml = `<span class=\"ipc-arrow\">→<\u002Fspan><span class=\"ipc-to\">${to}<\u002Fspan>`;\n  else if (kind === 'br') toHtml = `<span class=\"ipc-arrow\">→<\u002Fspan><span class=\"ipc-to\">all<\u002Fspan>`;\n  else if (kind === 'who') toHtml = `<span class=\"ipc-arrow\">→<\u002Fspan><span class=\"ipc-to\">registry<\u002Fspan>`;\n  row.innerHTML = `\n    <span class=\"ipc-time\">${time}<\u002Fspan>\n    <span class=\"ipc-kind ${kind}\">${kind}<\u002Fspan>\n    <span class=\"ipc-who\">${from}<\u002Fspan>\n    ${toHtml}\n    <span class=\"ipc-body-text\">${body}<\u002Fspan>\n  `;\n  ipcBody.appendChild(row);\n  ipcBody.scrollTop = ipcBody.scrollHeight;\n  ipcN++;\n  ipcCount.textContent = ipcN;\n  ipcCount.classList.remove('zero');\n}\n\n// -------- Dialog --------\nasync function openDialog({ name, type }) {\n  dlgName.value = name;\n  dlgType.value = type;\n  dlgOverlay.classList.add('open');\n  await sleep(360);\n}\nasync function closeDialog() {\n  dlgOverlay.classList.remove('open');\n  await sleep(250);\n}\n\n// -------- Narrator --------\nfunction setStep({ chapter, index, total, title, body }) {\n  stepIndex.textContent = `Step ${index} of ${total}`;\n  stepHeadline.textContent = title;\n  stepBody.innerHTML = body;\n  // Progress dots\n  stepProgress.innerHTML = '';\n  for (let i = 1; i <= total; i++) {\n    const d = document.createElement('div');\n    d.className = 'step-dot';\n    if (i < index) d.classList.add('done');\n    if (i === index) d.classList.add('active');\n    stepProgress.appendChild(d);\n  }\n  // Chapter buttons\n  for (const btn of document.querySelectorAll('.chapter-btn')) {\n    btn.classList.toggle('active', Number(btn.dataset.idx) === chapter);\n  }\n}\n\n// -------- Reset --------\nfunction resetAll() {\n  cancelled = true;\n  sessions.clear();\n  sessionList.innerHTML = '';\n  termInner.innerHTML = '';\n  termEmpty.style.display = 'flex';\n  ipcBody.innerHTML = '<div class=\"ipc-empty\" id=\"ipcEmpty\">No messages yet. Inter-agent DMs and broadcasts will appear here.<\u002Fdiv>';\n  ipcN = 0;\n  ipcCount.textContent = '0';\n  ipcCount.classList.add('zero');\n  hideToast();\n  spotlightOff();\n  showCursor(false);\n  dlgOverlay.classList.remove('open');\n  promptsDrawer.classList.remove('open');\n  activeTerminal = null;\n}\n\n// ======================================================\n// Chapters: each is an async function. Each chapter sets\n// its own step cards via setStep.\n// ======================================================\n\nconst CHAPTERS = [\n  {\n    id: 'overview',\n    title: 'Overview',\n    total: 1,\n    run: async () => {\n      setStep({\n        chapter: 0, index: 1, total: 1,\n        title: 'A visual home for CLI agents',\n        body: `Clodex wraps the <code>claude<\u002Fcode> and <code>codex<\u002Fcode> command-line agents in a single desktop app. Each sidebar entry is a real PTY running one agent. The app adds an inter-agent messaging protocol so sessions can DM, broadcast, and discover each other — all from a single window.\n        <br><br><span class=\"pill dm\">DM<\u002Fspan> <span class=\"pill br\">broadcast<\u002Fspan> <span class=\"pill who\">who<\u002Fspan> intents are routed by the main process as the agents emit them.`\n      });\n      // Focus the sidebar\n      await spotlightOn($('sessionList').parentElement, { pad: -2 });\n      await sleep(1200);\n      spotlightOff();\n    }\n  },\n\n  {\n    id: 'create-alice',\n    title: 'Create a session',\n    total: 3,\n    run: async () => {\n      // Step 1\n      setStep({\n        chapter: 1, index: 1, total: 3,\n        title: 'Cmd+T opens the New Session dialog',\n        body: `Click the <code>+<\u002Fcode> button in the sidebar header, or press <code>⌘T<\u002Fcode>. You pick a name, an agent type (<code>claude<\u002Fcode>, <code>codex<\u002Fcode>, or <code>bash<\u002Fcode>), a working directory, and an optional system prompt.`\n      });\n      await moveCursorTo($('btn-new'), { delay: 900 });\n      await spotlightOn($('btn-new'));\n      await clickCursor();\n      spotlightOff();\n      await openDialog({ name: 'alice', type: 'claude' });\n\n      // Step 2\n      setStep({\n        chapter: 1, index: 2, total: 3,\n        title: 'Name = IPC handle',\n        body: `The session name is the address other agents DM. It's global across all workspaces: <code>bob<\u002Fcode> in one window can reach <code>alice<\u002Fcode> in another by name.`\n      });\n      await moveCursorTo(dlgName, { delay: 700 });\n      await sleep(400);\n\n      // Step 3\n      setStep({\n        chapter: 1, index: 3, total: 3,\n        title: 'Create',\n        body: `Clodex spawns a <code>node-pty<\u002Fcode> subprocess running <code>claude --settings … --append-system-prompt-file …<\u002Fcode>. The system prompt injects the IPC protocol so the agent knows which <code>[cli:…]<\u002Fcode> intents it can emit.`\n      });\n      await moveCursorTo($('dlgCreate'), { delay: 700 });\n      await spotlightOn($('dlgCreate'));\n      await clickCursor();\n      spotlightOff();\n      await closeDialog();\n\n      // Spawn session in sidebar\n      const el = addSession({ name: 'alice', type: 'claude', cwd: '~/projects/clodex', ctx: 18 });\n      activateSession('alice');\n      await sleep(400);\n\n      await termWriteMany('alice', [\n        `<span class=\"t-dim\">Welcome to<\u002Fspan> <span class=\"t-dot-claude\">Claude Code<\u002Fspan><span class=\"t-dim\">!<\u002Fspan>`,\n        `<span class=\"t-dim\">────────────────────────────<\u002Fspan>`,\n        `<span class=\"t-dim\">/help for commands · clodex:alice · sonnet-4.5<\u002Fspan>`,\n        ` `,\n        `<span class=\"t-dot-claude\">❯<\u002Fspan> <span class=\"t-user\">_<\u002Fspan>`\n      ], { pause: 280 });\n      await sleep(600);\n    }\n  },\n\n  {\n    id: 'create-bob',\n    title: 'Add a peer',\n    total: 2,\n    run: async () => {\n      setStep({\n        chapter: 2, index: 1, total: 2,\n        title: 'Second session, different CLI',\n        body: `Let's add <code>bob<\u002Fcode> — a <code>codex<\u002Fcode> session. Same dialog, different agent. Both will share the <code>~/.clodex/<\u002Fcode> registry so they can find each other.`\n      });\n      await moveCursorTo($('btn-new'), { delay: 700 });\n      await clickCursor();\n      await openDialog({ name: 'bob', type: 'codex' });\n      await sleep(500);\n      await moveCursorTo($('dlgCreate'), { delay: 500 });\n      await clickCursor();\n      await closeDialog();\n\n      addSession({ name: 'bob', type: 'codex', cwd: '~/projects/clodex', ctx: 8 });\n\n      setStep({\n        chapter: 2, index: 2, total: 2,\n        title: 'Registered on the shared socket',\n        body: `Each agent session listens on <code>~/.clodex/&lt;name&gt;.sock<\u002Fcode>. The <code>registry.json<\u002Fcode> index makes them discoverable. Bash sessions are skipped — they're private terminals, invisible to <code>[cli:who]<\u002Fcode>.`\n      });\n\n      // Leave alice terminal visible but show that both now exist\n      await sleep(500);\n\n      // Switch to bob\n      activateSession('bob');\n      await termWriteMany('bob', [\n        `<span class=\"t-dim\">codex<\u002Fspan> <span class=\"t-dim\">(gpt-5.1)<\u002Fspan> <span class=\"t-dim\">· clodex:bob<\u002Fspan>`,\n        `<span class=\"t-dim\">type your message, /help for commands<\u002Fspan>`,\n        ` `,\n        `<span class=\"t-dot-codex\">▎<\u002Fspan> <span class=\"t-user\">_<\u002Fspan>`\n      ], { pause: 250 });\n      await sleep(700);\n    }\n  },\n\n  {\n    id: 'dm',\n    title: 'DM between agents',\n    total: 3,\n    run: async () => {\n      setStep({\n        chapter: 3, index: 1, total: 3,\n        title: 'Ask alice to reach bob',\n        body: `Agents don't know a new API — they emit <code>[cli:dm bob] …<\u002Fcode> in their normal response. A background watcher tails their JSONL transcript, extracts assistant text, and scans for the intent.`\n      });\n\n      activateSession('alice');\n      setActivity('alice', 'thinking');\n      await sleep(400);\n      await termWriteMany('alice', [\n        `<span class=\"t-dot-claude\">❯<\u002Fspan> <span class=\"t-user\">DM bob and ask him to pull the latest main and check the failing test<\u002Fspan>`,\n        ` `,\n        `<span class=\"t-dot-claude\">✻<\u002Fspan> <span class=\"t-dim\">Thinking…<\u002Fspan>`,\n      ], { pause: 350 });\n      await sleep(700);\n\n      // Assistant response with intent\n      setStep({\n        chapter: 3, index: 2, total: 3,\n        title: 'Intent emitted',\n        body: `Here comes alice's response, containing the <code>[cli:dm …]<\u002Fcode> token. The watcher plucks it out of the assistant text before the user sees anything forwarded.`\n      });\n      setActivity('alice', null);\n      await termWriteMany('alice', [\n        `<span class=\"t-ast\">On it. I'll ask bob to check.<\u002Fspan>`,\n        `<span class=\"t-intent\">[cli:dm bob]<\u002Fspan> <span class=\"t-ast\">please pull latest main and run the failing test in auth.test.js<\u002Fspan>`,\n        ` `,\n        `<span class=\"t-dot-claude\">❯<\u002Fspan> <span class=\"t-user\">_<\u002Fspan>`,\n      ], { pause: 450 });\n\n      // Log the DM\n      addIpc({ kind: 'dm', from: 'alice', to: 'bob', body: 'please pull latest main and run the failing test in auth.test.js' });\n      await sleep(400);\n\n      // Pulse bob's tab\n      mentionPulse('bob');\n      await showToast('Sidebar mention', 'Amber pulse when a session receives a message', sessions.get('bob').el, { pos: 'right' });\n      await sleep(1300);\n      hideToast();\n\n      // Switch to bob, show the [from alice] injection\n      setStep({\n        chapter: 3, index: 3, total: 3,\n        title: 'Delivered into bob\\'s stdin',\n        body: `Clodex writes <code>[from alice] …<\u002Fcode> into bob's PTY stdin with a <code>Ctrl-U<\u002Fcode>-clear + newline. Bob sees it as if alice typed at their keyboard — no new tool, no new UI.`\n      });\n\n      activateSession('bob');\n      await sleep(300);\n      await termWriteMany('bob', [\n        `<span class=\"t-from\">[from alice]<\u002Fspan> <span class=\"t-user\">please pull latest main and run the failing test in auth.test.js<\u002Fspan>`,\n        ` `,\n        `<span class=\"t-dot-codex\">▎<\u002Fspan> <span class=\"t-dim\">Thinking…<\u002Fspan>`,\n      ], { pause: 350 });\n      setActivity('bob', 'thinking');\n      await sleep(900);\n\n      setActivity('bob', null);\n      await termWriteMany('bob', [\n        `<span class=\"t-ast\">Pulling main.<\u002Fspan>`,\n        `<span class=\"t-dim\">$ git pull --ff-only origin main<\u002Fspan>`,\n        `<span class=\"t-dim\">Fast-forward: 12 files changed, 94 insertions, 51 deletions<\u002Fspan>`,\n        `<span class=\"t-ast\">Running the test.<\u002Fspan>`,\n        `<span class=\"t-dim\">$ npx jest auth.test.js<\u002Fspan>`,\n        `<span class=\"t-err\">  ✕ rejects expired tokens<\u002Fspan>`,\n        `<span class=\"t-intent\">[cli:dm alice]<\u002Fspan> <span class=\"t-ast\">reproduced — expired token case. Stack points to verifyJwt() returning ok when exp &lt; now. I'll draft a fix.<\u002Fspan>`,\n        ` `,\n        `<span class=\"t-dot-codex\">▎<\u002Fspan> <span class=\"t-user\">_<\u002Fspan>`,\n      ], { pause: 260 });\n      addIpc({ kind: 'dm', from: 'bob', to: 'alice', body: 'reproduced — expired token case. Stack points to verifyJwt() returning ok when exp < now. Drafting a fix.' });\n      mentionPulse('alice');\n      await sleep(900);\n    }\n  },\n\n  {\n    id: 'broadcast',\n    title: 'Broadcast & who',\n    total: 2,\n    run: async () => {\n      setStep({\n        chapter: 4, index: 1, total: 2,\n        title: 'Broadcast to the workspace',\n        body: `<code>[cli:broadcast] …<\u002Fcode> hits every agent in the same workspace window. Bash sessions are skipped — they can't process intents.`\n      });\n\n      // Add a 3rd bystander session so broadcast has >2 recipients\n      addSession({ name: 'adam', type: 'claude', cwd: '~/projects/other-repo', ctx: 42 });\n\n      // Use the broadcast input\n      const bInput = $('bcastInput');\n      await moveCursorTo(bInput, { delay: 700 });\n      await spotlightOn(bInput);\n      await clickCursor();\n      bInput.value = 'heads up — CI is red on main, holding merges';\n      await sleep(400);\n      bInput.value = '';\n      spotlightOff();\n      await sleep(200);\n\n      addIpc({ kind: 'br', from: 'user', to: 'all', body: 'heads up — CI is red on main, holding merges' });\n      mentionPulse('alice');\n      mentionPulse('bob');\n      mentionPulse('adam');\n\n      // Switch to adam so we can show them receiving\n      activateSession('adam');\n      await termWriteMany('adam', [\n        `<span class=\"t-dim\">Welcome to<\u002Fspan> <span class=\"t-dot-claude\">Claude Code<\u002Fspan><span class=\"t-dim\">!<\u002Fspan>`,\n        `<span class=\"t-dim\">/help for commands · clodex:adam<\u002Fspan>`,\n        ` `,\n        `<span class=\"t-from\">[broadcast from user]<\u002Fspan> <span class=\"t-user\">heads up — CI is red on main, holding merges<\u002Fspan>`,\n        ` `,\n        `<span class=\"t-dot-claude\">❯<\u002Fspan> <span class=\"t-user\">_<\u002Fspan>`,\n      ], { pause: 220 });\n\n      setStep({\n        chapter: 4, index: 2, total: 2,\n        title: 'Who\\'s online?',\n        body: `Agents can emit <code>[cli:who]<\u002Fcode> themselves. Clodex injects <code>[peers] alice, adam<\u002Fcode> back into their stdin — a one-line directory lookup, workspace-scoped.`\n      });\n\n      // Show an agent asking who's online\n      activateSession('alice');\n      setActivity('alice', 'thinking');\n      await termWriteMany('alice', [\n        `<span class=\"t-dot-claude\">❯<\u002Fspan> <span class=\"t-user\">who is on this workspace?<\u002Fspan>`,\n        `<span class=\"t-intent\">[cli:who]<\u002Fspan>`,\n      ], { pause: 300 });\n      addIpc({ kind: 'who', from: 'alice', to: 'registry', body: 'who is online?' });\n      await sleep(500);\n      setActivity('alice', null);\n      await termWriteMany('alice', [\n        `<span class=\"t-peers\">[peers]<\u002Fspan> <span class=\"t-ast\">bob, adam<\u002Fspan>`,\n        `<span class=\"t-ast\">adam and bob are on. Want me to loop them in?<\u002Fspan>`,\n        ` `,\n        `<span class=\"t-dot-claude\">❯<\u002Fspan> <span class=\"t-user\">_<\u002Fspan>`,\n      ], { pause: 280 });\n      await sleep(700);\n    }\n  },\n\n  {\n    id: 'ctx-and-prompts',\n    title: 'Context badge & Prompts',\n    total: 2,\n    run: async () => {\n      setStep({\n        chapter: 5, index: 1, total: 2,\n        title: 'Live context % in the sidebar',\n        body: `For Claude sessions, the sidebar shows a color-coded badge reading from Claude's statusline field <code>context_window.used_percentage<\u002Fcode> — green under 60, orange up to 80, red above.`\n      });\n      // Show ctx badges ramping\n      await showToast('Live badge', 'Reads the real % from the CLI — no estimation.', sessions.get('alice').el, { pos: 'right' });\n      await sleep(300);\n      // Ramp alice\n      for (const pct of [32, 48, 61, 74, 83]) {\n        setCtx('alice', pct);\n        await sleep(350);\n      }\n      hideToast();\n      await sleep(500);\n\n      setStep({\n        chapter: 5, index: 2, total: 2,\n        title: 'Prompts library',\n        body: `Save reusable prompts and either <strong>inject<\u002Fstrong> them into the active session (like you pasted at the PTY) or <strong>seed<\u002Fstrong> a new session with one as a system prompt.`\n      });\n      await moveCursorTo($('btn-prompts'), { delay: 700 });\n      await spotlightOn($('btn-prompts'));\n      await clickCursor();\n      spotlightOff();\n      promptsDrawer.classList.add('open');\n      await sleep(700);\n\n      // Click one\n      const firstPrompt = promptsDrawer.querySelector('.prompt-item');\n      await moveCursorTo(firstPrompt, { delay: 600 });\n      await spotlightOn(firstPrompt);\n      await clickCursor();\n      spotlightOff();\n\n      activateSession('alice');\n      promptsDrawer.classList.remove('open');\n      await sleep(300);\n      await termWriteMany('alice', [\n        `<span class=\"t-dot-claude\">❯<\u002Fspan> <span class=\"t-user\">cd tests && npm test -- --watch. report failures by file<\u002Fspan>`,\n        ` `,\n        `<span class=\"t-dot-claude\">✻<\u002Fspan> <span class=\"t-dim\">Thinking…<\u002Fspan>`,\n      ], { pause: 260 });\n      await sleep(700);\n    }\n  },\n\n  {\n    id: 'persistence',\n    title: 'Persistence & resume',\n    total: 1,\n    run: async () => {\n      setStep({\n        chapter: 6, index: 1, total: 1,\n        title: 'Sessions survive restarts',\n        body: `Every session is written to <code>sessions.json<\u002Fcode> with its name, type, cwd, and most recent transcript UUID. On relaunch, Clodex runs <code>claude --resume &lt;id&gt;<\u002Fcode> or <code>codex resume &lt;id&gt;<\u002Fcode> and the conversation picks up where it left off.\n        <br><br>Multiple windows = multiple workspaces. Close a window and the sessions keep running in the background; reopen from the tray and their missed output replays into the terminal.`\n      });\n      // Simulate a restart: flash workspace label\n      const ws = $('workspaceLabel');\n      for (let i = 0; i < 3; i++) {\n        ws.style.opacity = '0.3';\n        await sleep(140);\n        ws.style.opacity = '1';\n        await sleep(140);\n      }\n      // All three sessions resumed — switch through them quickly\n      for (const n of ['alice', 'bob', 'adam']) {\n        activateSession(n);\n        await sleep(450);\n      }\n      await sleep(400);\n    }\n  }\n];\n\n// -------- Chapter buttons --------\nfunction buildChapterList() {\n  const host = $('chapterList');\n  host.innerHTML = '';\n  CHAPTERS.forEach((c, i) => {\n    const btn = document.createElement('button');\n    btn.className = 'chapter-btn';\n    btn.dataset.idx = i;\n    btn.textContent = `${i+1}. ${c.title}`;\n    btn.addEventListener('click', () => jumpTo(i));\n    host.appendChild(btn);\n  });\n}\n\n// -------- Run control --------\nasync function runFromChapter(start) {\n  cancelled = false;\n  playing = true;\n  $('btnPlay').textContent = '⏸ Pause';\n  for (let i = start; i < CHAPTERS.length; i++) {\n    if (cancelled) break;\n    currentChapter = i;\n    saveProgress();\n    for (const btn of document.querySelectorAll('.chapter-btn')) {\n      btn.classList.toggle('active', Number(btn.dataset.idx) === i);\n    }\n    await CHAPTERS[i].run();\n    if (cancelled) break;\n    await sleep(800);\n  }\n  playing = false;\n  $('btnPlay').textContent = '▶ Play';\n}\n\nasync function jumpTo(idx) {\n  cancelled = true;\n  await sleep(120);\n  resetAll();\n  // Run from beginning up to idx silently, then show idx\n  // For simplicity: just run the target chapter from a clean reset\n  // but we need prior state for later chapters. Build prior state quickly.\n  cancelled = false;\n  for (let i = 0; i <= idx; i++) {\n    currentChapter = i;\n    for (const btn of document.querySelectorAll('.chapter-btn')) {\n      btn.classList.toggle('active', Number(btn.dataset.idx) === i);\n    }\n    // Fast-forward prior chapters by running at high speed\n    const savedSpeed = speed;\n    if (i < idx) speed = 0.05;\n    await CHAPTERS[i].run();\n    speed = savedSpeed;\n    if (cancelled) return;\n  }\n  saveProgress();\n}\n\nfunction saveProgress() {\n  try { localStorage.setItem('clodex-demo-chapter', String(currentChapter)); } catch(e) {}\n}\nfunction loadProgress() {\n  try { return Number(localStorage.getItem('clodex-demo-chapter') || '0') || 0; } catch(e) { return 0; }\n}\n\n// -------- Event wiring --------\n$('btnPlay').addEventListener('click', async () => {\n  if (playing) {\n    cancelled = true;\n    playing = false;\n    $('btnPlay').textContent = '▶ Play';\n  } else {\n    await runFromChapter(currentChapter);\n  }\n});\n$('btnRestart').addEventListener('click', async () => {\n  cancelled = true;\n  await sleep(120);\n  resetAll();\n  currentChapter = 0;\n  saveProgress();\n  await runFromChapter(0);\n});\n$('speedSelect').addEventListener('change', e => {\n  speed = Number(e.target.value);\n});\n\n// Tweaks\n$('btnTweaks').addEventListener('click', () => {\n  $('tweaksPanel').classList.toggle('open');\n});\n$('tw-auto').addEventListener('change', e => {\n  TWEAKS.autoplay = e.target.checked;\n  window.parent?.postMessage({type:'__edit_mode_set_keys', edits:{autoplay: TWEAKS.autoplay}}, '*');\n});\n$('tw-accent').addEventListener('input', e => {\n  TWEAKS.accent = e.target.value;\n  setAccent(e.target.value);\n  window.parent?.postMessage({type:'__edit_mode_set_keys', edits:{accent: TWEAKS.accent}}, '*');\n});\n$('tw-cursor').addEventListener('change', e => {\n  TWEAKS.showCursor = e.target.checked;\n  if (!e.target.checked) showCursor(false);\n  window.parent?.postMessage({type:'__edit_mode_set_keys', edits:{showCursor: TWEAKS.showCursor}}, '*');\n});\n$('tw-spot').addEventListener('change', e => {\n  TWEAKS.showSpotlight = e.target.checked;\n  if (!e.target.checked) showSpotlight(false);\n  window.parent?.postMessage({type:'__edit_mode_set_keys', edits:{showSpotlight: TWEAKS.showSpotlight}}, '*');\n});\n\n// Edit-mode bridge\nwindow.addEventListener('message', (ev) => {\n  if (ev.data?.type === '__activate_edit_mode') $('tweaksPanel').classList.add('open');\n  if (ev.data?.type === '__deactivate_edit_mode') $('tweaksPanel').classList.remove('open');\n});\nwindow.parent?.postMessage({type: '__edit_mode_available'}, '*');\n\n// -------- Stage scaling --------\nfunction fitStage() {\n  const stage = $('stage');\n  const scaler = $('scaler');\n  const sw = stage.offsetWidth, sh = stage.offsetHeight;\n  const vw = scaler.clientWidth, vh = scaler.clientHeight;\n  const scale = Math.min(vw / sw, vh / sh, 1);\n  stage.style.transform = `scale(${scale})`;\n}\nwindow.addEventListener('resize', fitStage);\nfitStage();\n\n// -------- Init --------\nbuildChapterList();\nsetAccent(TWEAKS.accent);\n$('tw-accent').value = TWEAKS.accent;\n$('tw-auto').checked = TWEAKS.autoplay;\n$('tw-cursor').checked = TWEAKS.showCursor;\n$('tw-spot').checked = TWEAKS.showSpotlight;\n\n(async () => {\n  const start = loadProgress();\n  currentChapter = start;\n  // If user had progressed, drop them at that chapter with prior state baked in\n  if (start > 0) {\n    await jumpTo(start);\n  } else {\n    // Show the initial step card for the Overview\n    await CHAPTERS[0].run();\n  }\n  if (TWEAKS.autoplay && start === 0) {\n    await sleep(400);\n    await runFromChapter(1);\n  }\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
